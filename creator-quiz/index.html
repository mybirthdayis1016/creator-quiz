<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --gold: #FCEEC9;
  --gold-deep: #C8A951;
  --black: #000000;
  --ink: #111111;
  --ink-light: #333333;
  --stone: #888888;
  --stone-light: #BBBBBB;
  --paper: #FAFAF8;
  --paper-warm: #F5F0E8;
  --line: rgba(0,0,0,0.08);
  --line-mid: rgba(0,0,0,0.15);
  --line-dark: rgba(0,0,0,0.35);
  --radius: 4px;
  --radius-lg: 8px;
}
html { font-size: 17px; -webkit-text-size-adjust: 100%; text-rendering: optimizeLegibility; -webkit-font-smoothing: antialiased; }
body { font-family: 'Noto Sans TC', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; line-height: 1.7; }

/* Header */
.header { background: var(--black); height: 60px; display: flex; align-items: center; justify-content: center; position: sticky; top: 0; z-index: 100; }
.header a { display: flex; align-items: center; text-decoration: none; }
.header img { height: 36px; display: block; }

/* 主容器 */
.wrap { max-width: 600px; margin: 0 auto; padding: 3rem 1.5rem 6rem; }

/* 進度 */
.prog-meta { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
.prog-chapter { font-size: 11px; letter-spacing: .12em; color: var(--stone); font-weight: 500; }
.prog-count { font-size: 11px; color: var(--stone); font-variant-numeric: tabular-nums; }
.prog-track { height: 1px; background: var(--line-mid); margin-bottom: 3rem; position: relative; overflow: visible; }
.prog-fill { height: 2px; background: var(--gold-deep); position: absolute; top: -0.5px; left: 0; transition: width .5s cubic-bezier(.4,0,.2,1); }

/* 問題 */
.q-tag { display: inline-block; font-size: 10px; font-weight: 500; letter-spacing: .16em; color: var(--gold-deep); border: 1px solid var(--gold-deep); border-radius: 2px; padding: 3px 10px; margin-bottom: 1.25rem; }
.q-text { font-family: 'Noto Serif TC', serif; font-size: 22px; font-weight: 500; line-height: 1.75; color: var(--ink); margin-bottom: .75rem; letter-spacing: .02em; }
.q-hint { font-size: 13px; color: var(--stone); line-height: 1.7; margin-bottom: 2.5rem; font-weight: 300; }

/* Likert */
.likert-labels { display: flex; justify-content: space-between; font-size: 10px; color: var(--stone-light); letter-spacing: .06em; margin-bottom: .75rem; }
.likert-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-bottom: 3rem; }
.lk { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 16px 4px 14px; border: 1px solid var(--line-mid); border-radius: var(--radius); cursor: pointer; transition: all .2s ease; user-select: none; -webkit-tap-highlight-color: transparent; background: white; }
.lk:hover { border-color: var(--gold-deep); background: var(--paper-warm); }
.lk.sel { border-color: var(--black); background: var(--black); }
.lk.sel .lk-dot { background: var(--gold-deep); border-color: var(--gold-deep); }
.lk.sel .lk-num { color: var(--gold); }
.lk.sel .lk-word { color: var(--stone-light); }
.lk-dot { width: 8px; height: 8px; border-radius: 50%; border: 1.5px solid var(--stone-light); transition: all .2s; }
.lk-num { font-size: 16px; font-weight: 300; color: var(--ink-light); }
.lk-word { font-size: 10px; color: var(--stone); text-align: center; line-height: 1.3; min-height: 28px; display: flex; align-items: center; justify-content: center; }

/* 按鈕 */
.nav { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
.btn { font-family: 'Noto Sans TC', sans-serif; font-size: 14px; font-weight: 500; padding: 14px 28px; border-radius: var(--radius); cursor: pointer; border: 1px solid var(--line-dark); background: white; color: var(--ink); transition: all .2s; letter-spacing: .04em; }
.btn:hover { background: var(--paper-warm); border-color: var(--ink); }
.btn.pri { background: var(--black); color: var(--gold); border-color: var(--black); flex: 1; }
.btn.pri:hover { background: var(--ink-light); }
.btn:disabled { opacity: .25; cursor: default; pointer-events: none; }

/* 結果頁 */
.result { display: none; }
.res-hero { text-align: center; padding: 2.5rem 0; border-bottom: 1px solid var(--line-mid); margin-bottom: 2.5rem; }
.res-eyebrow { font-size: 10px; font-weight: 500; letter-spacing: .2em; color: var(--stone); margin-bottom: 1.25rem; text-transform: uppercase; }
.trait-row { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; margin-bottom: 1.5rem; }
.trait { font-size: 11px; font-weight: 500; padding: 4px 12px; border-radius: 2px; border: 1px solid var(--gold-deep); color: var(--gold-deep); letter-spacing: .06em; }
.res-name { font-family: 'Noto Serif TC', serif; font-size: 28px; font-weight: 700; line-height: 1.4; color: var(--ink); margin-bottom: .75rem; letter-spacing: .02em; }
.res-tagline { font-size: 15px; color: var(--stone); line-height: 1.8; font-weight: 300; }

/* 區塊 */
.sec { margin-bottom: 2rem; }
.sec-lbl { font-size: 10px; font-weight: 700; letter-spacing: .18em; color: var(--stone); margin-bottom: .75rem; text-transform: uppercase; }
.sec-txt { font-size: 15px; line-height: 1.9; color: var(--ink-light); }

/* 維度 */
.dim-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 2rem; }
.dim-card { background: white; border: 1px solid var(--line-mid); border-radius: var(--radius); padding: 14px 16px; }
.dim-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
.dim-name { font-size: 12px; font-weight: 500; color: var(--ink); }
.dim-pct { font-size: 11px; color: var(--gold-deep); font-weight: 500; }
.dim-track { height: 2px; background: var(--line-mid); border-radius: 1px; overflow: hidden; }
.dim-fill { height: 100%; background: var(--gold-deep); border-radius: 1px; }

/* 老陳老師說 */
.insight { background: var(--black); border-radius: var(--radius); padding: 1.75rem; margin-bottom: 2rem; }
.insight-lbl { font-size: 10px; font-weight: 700; letter-spacing: .18em; color: var(--gold-deep); margin-bottom: .875rem; text-transform: uppercase; }
.insight-txt { font-size: 15px; line-height: 1.9; color: var(--gold); font-weight: 300; }

/* 差異化 */
.diff-box { border-left: 3px solid var(--gold-deep); padding: 1.25rem 1.5rem; margin-bottom: 2rem; background: white; }
.diff-lbl { font-size: 10px; font-weight: 700; letter-spacing: .18em; color: var(--gold-deep); margin-bottom: .625rem; text-transform: uppercase; }
.diff-txt { font-size: 14px; color: var(--ink-light); line-height: 1.9; font-weight: 300; }

/* 系統 */
.sys-box { background: var(--paper-warm); border: 1px solid var(--line-mid); border-radius: var(--radius); padding: 1.5rem 1.75rem; margin-bottom: 2rem; }
.sys-lbl { font-size: 10px; font-weight: 700; letter-spacing: .18em; color: var(--stone); margin-bottom: .625rem; text-transform: uppercase; }
.sys-title { font-family: 'Noto Serif TC', serif; font-size: 17px; font-weight: 500; color: var(--ink); margin-bottom: .75rem; }
.sys-txt { font-size: 14px; color: var(--ink-light); line-height: 1.9; font-weight: 300; }

/* BLK 警告 */
.blk-warn { border: 1px solid var(--gold-deep); border-radius: var(--radius); padding: 1.5rem 1.75rem; margin-bottom: 2rem; }
.blk-warn-tag { font-size: 10px; font-weight: 700; letter-spacing: .18em; color: var(--gold-deep); margin-bottom: .75rem; text-transform: uppercase; }
.blk-warn-title { font-family: 'Noto Serif TC', serif; font-size: 16px; font-weight: 500; color: var(--ink); margin-bottom: .75rem; line-height: 1.6; }
.blk-warn-txt { font-size: 14px; color: var(--ink-light); line-height: 1.9; margin-bottom: 1.25rem; font-weight: 300; }
.blk-warn-steps { display: flex; flex-direction: column; gap: 10px; }
.blk-warn-step { display: flex; gap: 12px; align-items: flex-start; }
.blk-warn-num { width: 22px; height: 22px; border-radius: 50%; background: var(--gold-deep); color: white; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0; margin-top: 2px; }
.blk-warn-stxt { font-size: 13px; line-height: 1.8; color: var(--ink-light); font-weight: 300; }

/* 內容類型 */
.ctype-grid { display: flex; flex-direction: column; gap: 8px; margin-top: 1rem; }
.ctype-btn { display: flex; align-items: flex-start; gap: 14px; padding: 16px 18px; border: 1px solid var(--line-mid); border-radius: var(--radius); cursor: pointer; transition: all .2s; text-align: left; background: white; font-family: 'Noto Sans TC', sans-serif; color: var(--ink); width: 100%; -webkit-tap-highlight-color: transparent; }
.ctype-btn:hover { border-color: var(--gold-deep); background: var(--paper-warm); }
.ctype-btn.active { border-color: var(--black); background: var(--black); }
.ctype-btn.active .ctype-dot { background: var(--gold-deep); border-color: var(--gold-deep); }
.ctype-btn.active .ctype-title { color: var(--gold); }
.ctype-btn.active .ctype-eg { color: var(--stone); }
.ctype-dot { width: 14px; height: 14px; border-radius: 50%; border: 1.5px solid var(--stone-light); flex-shrink: 0; margin-top: 3px; transition: all .2s; }
.ctype-info { flex: 1; }
.ctype-title { font-size: 15px; font-weight: 500; margin-bottom: 4px; color: var(--ink); }
.ctype-eg { font-size: 12px; color: var(--stone); line-height: 1.6; font-weight: 300; }

/* 步驟 */
.steps-wrap { display: none; margin-bottom: 2rem; margin-top: 1.5rem; }
.steps-wrap.show { display: block; }
.steps { display: flex; flex-direction: column; gap: 16px; }
.step { display: flex; gap: 14px; }
.step-num { width: 26px; height: 26px; border-radius: 50%; background: var(--gold-deep); color: white; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; margin-top: 1px; }
.step-txt { font-size: 14px; line-height: 1.85; color: var(--ink-light); font-weight: 300; }

/* CTA */
.cta-box { background: var(--black); border-radius: var(--radius-lg); padding: 2.5rem 2rem; text-align: center; margin-top: 1rem; }
.cta-eyebrow { font-size: 10px; font-weight: 700; letter-spacing: .2em; color: var(--gold-deep); margin-bottom: 1rem; text-transform: uppercase; }
.cta-title { font-family: 'Noto Serif TC', serif; font-size: 20px; font-weight: 700; line-height: 1.6; color: var(--gold); margin-bottom: .875rem; }
.cta-sub { font-size: 13px; color: var(--stone-light); line-height: 1.8; margin-bottom: 1.75rem; font-weight: 300; }
.cta-btn { display: inline-block; font-family: 'Noto Sans TC', sans-serif; font-size: 14px; font-weight: 700; padding: 14px 36px; background: var(--gold-deep); color: var(--black); border-radius: var(--radius); border: none; cursor: pointer; text-decoration: none; transition: opacity .2s; letter-spacing: .06em; }
.cta-btn:hover { opacity: .85; }

.restart { display: block; text-align: center; font-size: 12px; color: var(--stone); margin-top: 1.25rem; cursor: pointer; text-decoration: none; background: none; border: none; font-family: 'Noto Sans TC', sans-serif; width: 100%; letter-spacing: .06em; }
.divider { border: none; border-top: 1px solid var(--line); margin: 2.5rem 0; }

/* 手機優化 */
@media (max-width: 480px) {
  html { font-size: 16px; }
  .wrap { padding: 2rem 1.25rem 5rem; }
  .q-text { font-size: 20px; }
  .lk-word { font-size: 9px; }
  .lk-num { font-size: 15px; }
  .dim-grid { grid-template-columns: 1fr; }
  .res-name { font-size: 24px; }
  .insight { padding: 1.5rem; }
  .cta-box { padding: 2rem 1.5rem; }
}
@media (max-width: 360px) {
  .lk { padding: 12px 2px 10px; }
  .lk-word { font-size: 8px; }
}
</style>

<script>
const WORDS = ['完全不像我','比較不像','有時候像','蠻像的','完全像我'];
const Qs = [
  {dim:'E',dir:'I',ch:'第一章：能量來源',tag:'能量來源',t:'跟一群人相處一整天之後，我需要一個人待著充電。',s:'想想你實際上的感受，不是你覺得應該怎樣。'},
  {dim:'E',dir:'I',ch:'第一章：能量來源',tag:'能量來源',t:'比起很多人留言互動，我更享受一個人慢慢把一篇文章寫好。',s:'哪種狀態讓你更有成就感？'},
  {dim:'E',dir:'E',ch:'第一章：能量來源',tag:'能量來源',t:'我喜歡在網路上認識新朋友、和陌生人聊天。',s:'就算只是文字互動也算，選最像你平常的狀態。'},
  {dim:'E',dir:'E',ch:'第一章：能量來源',tag:'能量來源',t:'我在人多的場合會比較有活力，一個人反而容易感到無聊。',s:'這描述你嗎？'},
  {dim:'E',dir:'I',ch:'第一章：能量來源',tag:'能量來源',t:'我通常需要一段獨處時間，才能把想法整理清楚。',s:'獨處對你來說是充電還是消耗？'},
  {dim:'E',dir:'E',ch:'第一章：能量來源',tag:'能量來源',t:'我喜歡把我在做的事說給別人聽，分享本身就讓我有動力。',s:'分享這個動作，對你來說是享受還是義務？'},
  {dim:'N',dir:'N',ch:'第二章：思考方式',tag:'思考方式',t:'看到一件新事物，我第一個想的是「這讓我聯想到什麼」。',s:'不是應該怎麼想，是你真實的第一個念頭。'},
  {dim:'N',dir:'S',ch:'第二章：思考方式',tag:'思考方式',t:'我比較喜歡有步驟、有清單的內容，而不是概念性的思考文章。',s:'在消費別人內容的時候，你偏好哪一種？'},
  {dim:'N',dir:'N',ch:'第二章：思考方式',tag:'思考方式',t:'我常常同時有很多想法，腦袋停不下來。',s:'這是描述你日常的狀態嗎？'},
  {dim:'N',dir:'S',ch:'第二章：思考方式',tag:'思考方式',t:'我做事情喜歡先看具體的例子，再理解背後的原理。',s:'學習新東西時，你的習慣是什麼？'},
  {dim:'N',dir:'N',ch:'第二章：思考方式',tag:'思考方式',t:'我對「可能性」和「未來會怎樣」比「現在怎麼做」更感興趣。',s:'你更常想的是哪個？'},
  {dim:'N',dir:'S',ch:'第二章：思考方式',tag:'思考方式',t:'我比較相信親身試過的經驗，而不是理論上說得通的方法。',s:'你做決定時更依賴哪個？'},
  {dim:'GENDER',dir:'GENDER',ch:'關於你自己',tag:'關於你自己',t:'在我們繼續之前，選一個最接近你的選項：',s:'這可以幫助我們提供更精準的分析結果。'},
  {dim:'AGE',dir:'AGE',ch:'關於你自己',tag:'關於你自己',t:'你目前的年齡區間：',s:'選一個最接近你的選項。'},
  {dim:'F',dir:'F',ch:'第三章：決策方式',tag:'決策方式',t:'我希望看完我內容的人，第一個感受是「你懂我」。',s:'比起「我學到東西了」，你更想要哪一種回應？'},
  {dim:'F',dir:'T',ch:'第三章：決策方式',tag:'決策方式',t:'做一個困難決定時，我會先列出優缺點，分析完再決定。',s:'你實際上是這樣做決定的嗎？'},
  {dim:'F',dir:'F',ch:'第三章：決策方式',tag:'決策方式',t:'有人跟我說他的困境，我會先陪他說說感受，而不是馬上給建議。',s:'你通常的第一反應是什麼？'},
  {dim:'F',dir:'T',ch:'第三章：決策方式',tag:'決策方式',t:'我在乎我的內容有沒有邏輯、有沒有根據，而不只是感覺好不好。',s:'你評估內容品質的標準是什麼？'},
  {dim:'F',dir:'F',ch:'第三章：決策方式',tag:'決策方式',t:'我做決定時，「感覺對不對」比「數據說什麼」更重要。',s:'誠實選，不用想應該怎麼答。'},
  {dim:'F',dir:'T',ch:'第三章：決策方式',tag:'決策方式',t:'我喜歡用數字、案例、比較來說服人，而不是靠情感共鳴。',s:'你說服別人時，通常用哪種方式？'},
  {dim:'J',dir:'J',ch:'第四章：行動方式',tag:'行動方式',t:'我比較喜歡先把計畫想清楚，確定了再動手。',s:'描述你實際做事的方式，不是你理想的方式。'},
  {dim:'J',dir:'J',ch:'第四章：行動方式',tag:'行動方式',t:'沒做完的事情放著，會讓我一直不舒服。',s:'那種「還沒做完」的感覺，對你來說有多強烈？'},
  {dim:'J',dir:'P',ch:'第四章：行動方式',tag:'行動方式',t:'我做事比較隨興，根據當下狀態決定今天做什麼。',s:'這句話像不像你平常的行動模式？'},
  {dim:'J',dir:'P',ch:'第四章：行動方式',tag:'行動方式',t:'我喜歡保持彈性，不喜歡被固定的計畫或流程綁住。',s:'計畫對你來說是支撐還是束縛？'},
  {dim:'J',dir:'J',ch:'第四章：行動方式',tag:'行動方式',t:'我通常會提前規劃好，而不是等到最後一刻才決定。',s:'你面對截止日期時通常是什麼狀態？'},
  {dim:'J',dir:'P',ch:'第四章：行動方式',tag:'行動方式',t:'我比較喜歡邊做邊調整，而不是一開始就把所有細節想清楚。',s:'這更像你的工作方式嗎？'},
];

const CTYPES = [
  {key:'knowledge',title:'知識技能型',eg:'設計師、理財規劃師、健身教練、廚師、老師……我有一個專業或技能想分享'},
  {key:'life',title:'生活經歷型',eg:'媽媽、旅居者、斜槓工作者、從某個困境走出來的人……我想分享我的生活方式或人生故事'},
  {key:'creative',title:'創作作品型',eg:'插畫師、攝影師、手工藝者、室內設計師……我有作品要展示'},
  {key:'opinion',title:'觀點意見型',eg:'對產業有獨特見解的創業者、有主張的教育者……我對某些事有強烈看法想說出來'},
  {key:'business',title:'商品服務型',eg:'開店的人、接案者、有課程的老師、顧問……我有產品或服務，想用內容帶客戶'}
];

const BLK_WARN = {
  high_fear:{title:'你有一個隱藏的煞車——害怕被看見',txt:'你的個性特質非常清晰，但你有一個很強的心理阻力：害怕發出去被批評、被忽視、或被誤解。這個煞車會讓你即使知道該怎麼做，還是動不了。',steps:['先發給一個你信任的人看，不是發給所有人——從一個人開始，習慣「被看見」這件事。','告訴自己：第一篇的目的不是好，是「存在」。存在了，才有下一篇。','每次發完之後，不管有沒有人回應，都算完成一次——用完成次數衡量自己，不用回應數。']},
  high_notready:{title:'你有一個隱藏的煞車——覺得自己還沒準備好',txt:'你的個性特質非常清晰，但你有一個很強的習慣：等自己更好、更準備好、更有把握再開始。老陳老師告訴你：這個「準備好」的感覺永遠不會來，因為你的標準會跟著你一起成長。',steps:['設定一個「夠了就發」的標準，不是「完美才發」——例如：能讓一個人看懂，就夠了。','把你現在的程度記錄下來發出去，一年後回頭看，你會慶幸你當時發了。','找一個比你晚開始、但已經在做的人，問他：「你當時覺得準備好了嗎？」答案幾乎都是沒有。']},
  both:{title:'你有兩個隱藏的煞車——完美主義加上害怕被看見',txt:'你的個性特質非常清晰，但你同時有兩個強烈的阻力：覺得自己還不夠好，又害怕發出去被批評。這兩個加在一起，會讓你一直停在「準備」的狀態，永遠踏不出去。',steps:['今天只做一件事：寫三句話，不用發，先讓「動」這個動作存在。明天再寫三句，第三天才考慮發。','把你的第一篇設定為「只給一個人看」——不是發給所有人，只傳給一個你信任的朋友，先從這裡開始。','記住：你現在的「不夠好」，對還沒開始的人來說，已經是「遠遠超前」了。']}
};

const DIMS_DISPLAY = [
  {key:'E',loLabel:'內向能量',hiLabel:'外向能量'},
  {key:'N',loLabel:'實感思考',hiLabel:'直覺思考'},
  {key:'F',loLabel:'邏輯決策',hiLabel:'情感決策'},
  {key:'J',loLabel:'彈性行動',hiLabel:'計畫行動'}
];

let cur=0, ans=new Array(26).fill(null), currentMBTI='', selectedGender='', selectedAge='';

function render() {
  const q = Qs[cur];
  document.getElementById('chap-name').textContent = q.ch;
  document.getElementById('q-counter').textContent = (cur+1)+' / 26';
  document.getElementById('prog-fill').style.width = ((cur+1)/26*100)+'%';
  document.getElementById('q-tag').textContent = q.tag;
  document.getElementById('q-text').textContent = q.t;
  document.getElementById('q-hint').textContent = q.s;
  const row = document.getElementById('likert-row');
  const ll = document.querySelector('.likert-labels');
  row.innerHTML = '';
  if (q.dim === 'GENDER') {
    ll.style.display = 'none';
    row.style.gridTemplateColumns = 'repeat(3, 1fr)';
    ['女性','男性','不想透露'].forEach((opt,i) => {
      const d = document.createElement('div');
      d.className = 'lk'+(ans[cur]===i+1?' sel':'');
      d.style.padding = '18px 8px';
      d.innerHTML = '<div class="lk-dot"></div><div class="lk-word" style="font-size:15px;min-height:auto;margin-top:8px;font-weight:400">'+opt+'</div>';
      d.onclick = (v=>()=>{selectedGender=opt;pick(v);})(i+1);
      row.appendChild(d);
    });
  } else if (q.dim === 'AGE') {
    ll.style.display = 'none';
    row.style.gridTemplateColumns = 'repeat(3, 1fr)';
    ['18歲以下','18–20歲','21–24歲','25–29歲','30–34歲','35–39歲','40–44歲','45–49歲','50–54歲','55–59歲','60–64歲','65歲以上'].forEach((opt,i) => {
      const d = document.createElement('div');
      d.className = 'lk'+(ans[cur]===i+1?' sel':'');
      d.style.padding = '14px 4px';
      d.innerHTML = '<div class="lk-dot"></div><div class="lk-word" style="font-size:13px;min-height:auto;margin-top:8px;font-weight:400">'+opt+'</div>';
      d.onclick = (v=>()=>{selectedAge=opt;pick(v);})(i+1);
      row.appendChild(d);
    });
  } else {
    ll.style.display = 'flex';
    row.style.gridTemplateColumns = 'repeat(5, 1fr)';
    for (let i=1;i<=5;i++) {
      const d = document.createElement('div');
      d.className = 'lk'+(ans[cur]===i?' sel':'');
      d.innerHTML = '<div class="lk-dot"></div><div class="lk-num">'+i+'</div><div class="lk-word">'+WORDS[i-1]+'</div>';
      d.onclick = (v=>()=>pick(v))(i);
      row.appendChild(d);
    }
  }
  document.getElementById('btn-back').disabled = cur===0;
  document.getElementById('btn-next').disabled = ans[cur]===null;
  document.getElementById('btn-next').textContent = cur===25?'看我的結果 →':'下一題 →';
}

function pick(v){ans[cur]=v;render();}

function go(d){
  if(d===1&&cur===25){showResult();return;}
  cur=Math.max(0,Math.min(25,cur+d));
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

function getDims(){
  const dims={E:{hi:0,lo:0},N:{hi:0,lo:0},F:{hi:0,lo:0},J:{hi:0,lo:0}};
  Qs.forEach((q,i)=>{
    if(ans[i]===null||q.dim==='GENDER'||q.dim==='AGE')return;
    const hiDir={E:'E',N:'N',F:'F',J:'J'}[q.dim];
    if(q.dir===hiDir)dims[q.dim].hi+=ans[i];
    else dims[q.dim].lo+=ans[i];
  });
  const r={};
  Object.keys(dims).forEach(k=>{const t=dims[k].hi+dims[k].lo;r[k]=t>0?dims[k].hi/t:0.5;});
  return r;
}

function getMBTI(d){
  return (d.E>=0.5?'E':'I')+(d.N>=0.5?'N':'S')+(d.F>=0.5?'F':'T')+(d.J>=0.5?'J':'P');
}

function sendToSheets(archetype,dims,ctype){
  fetch('https://script.google.com/macros/s/AKfycbxSGTYmdxH6LSB08W7CJcaRsMhxJCezPAoi9Xuy6ovxuLs-vt6PmUvmjGLrgqsJt-QKAg/exec',{
    method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({archetype,ctype:ctype||'未選擇',E:Math.round(dims.E*100),N:Math.round(dims.N*100),F:Math.round(dims.F*100),J:Math.round(dims.J*100),gender:selectedGender||'未填寫',age:selectedAge||'未填寫'})
  }).catch(()=>{});
}

function showResult(){
  const d=getDims(),mbti=getMBTI(d);
  currentMBTI=mbti;
  document.getElementById('quiz').style.display='none';
  document.getElementById('result').style.display='block';
  document.getElementById('res-name').textContent='分析中...';
  document.getElementById('res-tagline').textContent='正在為你生成定位報告';
  window.scrollTo({top:0,behavior:'smooth'});
  fetch('https://quiz-api.mybirthdayis1016.workers.dev',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({E:Math.round(d.E*100),N:Math.round(d.N*100),F:Math.round(d.F*100),J:Math.round(d.J*100)})
  }).then(r=>r.json()).then(A=>{
    sendToSheets(A.name,d,'未選擇');
    if(typeof fbq!=='undefined')fbq('track','Lead',{content_name:A.name,content_category:A.mbti});
    document.getElementById('res-tagline').textContent=A.tag;
    document.getElementById('res-status').textContent=A.status;
    document.getElementById('res-insight').textContent=A.insight;
    document.getElementById('res-diff').textContent=A.diff;
    document.getElementById('diff-txt').textContent=A.diffTxt;
    document.getElementById('sys-title').textContent=A.sys;
    document.getElementById('sys-txt').textContent=A.sysTxt;
    const tr=document.getElementById('trait-row');tr.innerHTML='';
    (A.traits||[]).forEach(t=>{const s=document.createElement('span');s.className='trait';s.textContent=t;tr.appendChild(s);});
    const dg=document.getElementById('dim-grid');dg.innerHTML='';
    DIMS_DISPLAY.forEach(dd=>{
      const raw=d[dd.key]||0.5,pct=Math.round(raw*100),label=raw>=0.5?dd.hiLabel:dd.loLabel;
      const c=document.createElement('div');c.className='dim-card';
      c.innerHTML='<div class="dim-top"><div class="dim-name">'+label+'</div><div class="dim-pct">'+pct+'%</div></div><div class="dim-track"><div class="dim-fill" style="width:'+pct+'%"></div></div>';
      dg.appendChild(c);
    });
    const cg=document.getElementById('ctype-grid');cg.innerHTML='';
    CTYPES.forEach(ct=>{
      const b=document.createElement('button');b.className='ctype-btn';
      b.innerHTML='<div class="ctype-dot"></div><div class="ctype-info"><div class="ctype-title">'+ct.title+'</div><div class="ctype-eg">'+ct.eg+'</div></div>';
      b.onclick=()=>selectCtype(ct.key,b,A.name,d);cg.appendChild(b);
    });
    const bw=document.getElementById('blk-warn');
    const hf=d.BLK>=0.7&&ans[15]>=4,hn=d.BLK>=0.7&&ans[14]>=4;
    let wk=null;if(hf&&hn)wk='both';else if(hf)wk='high_fear';else if(hn)wk='high_notready';
    if(wk){
      const W=BLK_WARN[wk];
      document.getElementById('blk-warn-title').textContent=W.title;
      document.getElementById('blk-warn-txt').textContent=W.txt;
      const ws=document.getElementById('blk-warn-steps');ws.innerHTML='';
      W.steps.forEach((s,i)=>{const div=document.createElement('div');div.className='blk-warn-step';div.innerHTML='<div class="blk-warn-num">'+(i+1)+'</div><div class="blk-warn-stxt">'+s+'</div>';ws.appendChild(div);});
      bw.style.display='block';
    }else{bw.style.display='none';}
  }).catch(err=>{
    document.getElementById('res-name').textContent='載入失敗，請重新整理頁面';
    document.getElementById('res-tagline').textContent=err.message;
  });
}

function selectCtype(ctypeKey,el,archetypeName,dims){
  document.querySelectorAll('.ctype-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  if(archetypeName)sendToSheets(archetypeName,dims||getDims(),ctypeKey);
  fetch('https://quiz-api.mybirthdayis1016.workers.dev/steps',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({E:Math.round((dims||getDims()).E*100),N:Math.round((dims||getDims()).N*100),F:Math.round((dims||getDims()).F*100),J:Math.round((dims||getDims()).J*100),ctype:ctypeKey})
  }).then(r=>r.json()).then(data=>{
    const sw=document.getElementById('steps-wrap');sw.classList.add('show');
    const st=document.getElementById('steps');st.innerHTML='';
    (data.steps||[]).forEach((s,i)=>{const div=document.createElement('div');div.className='step';div.innerHTML='<div class="step-num">'+(i+1)+'</div><div class="step-txt">'+s+'</div>';st.appendChild(div);});
    setTimeout(()=>sw.scrollIntoView({behavior:'smooth',block:'start'}),100);
  }).catch(()=>{
    document.getElementById('steps-wrap').classList.add('show');
    document.getElementById('steps').innerHTML='<div class="step"><div class="step-txt">載入失敗，請重新整理頁面</div></div>';
  });
}

function restart(){
  cur=0;ans=new Array(26).fill(null);currentMBTI='';selectedGender='';selectedAge='';
  document.getElementById('result').style.display='none';
  document.getElementById('steps-wrap').classList.remove('show');
  document.getElementById('quiz').style.display='block';
  render();window.scrollTo({top:0,behavior:'smooth'});
}

render();
</script>
</body>
