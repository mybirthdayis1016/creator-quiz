.blk-warn-stxt { font-size: 13px; line-height: 1.7; color: var(--text-secondary); }
.ctype-grid { display: flex; flex-direction: column; gap: 8px; margin-top: .75rem; }
.ctype-btn { display: flex; align-items: flex-start; gap: 12px; padding: 14px 16px; border: 0.5px solid var(--border); border-radius: var(--radius-md); cursor: pointer; transition: border-color .15s, background .15s; text-align: left; background: transparent; font-family: 'Noto Sans TC', sans-serif; color: var(--text); width: 100%; -webkit-tap-highlight-color: transparent; }
.ctype-btn:hover { border-color: var(--border-hover); background: var(--bg-secondary); }
.ctype-btn.active { border-color: var(--border-active); background: var(--bg-secondary); }
.ctype-btn.active .ctype-dot { background: var(--accent); border-color: var(--accent); }
.ctype-dot { width: 15px; height: 15px; border-radius: 50%; border: 1.5px solid var(--border-hover); flex-shrink: 0; margin-top: 3px; transition: all .15s; }
.ctype-info { flex: 1; }
.ctype-title { font-size: 14px; font-weight: 500; margin-bottom: 3px; }
.ctype-eg { font-size: 12px; color: var(--text-secondary); line-height: 1.55; }
.steps-wrap { display: none; margin-bottom: 1.625rem; }
.steps-wrap.show { display: block; }
.steps { display: flex; flex-direction: column; gap: 14px; }
.step { display: flex; gap: 13px; }
.step-num { width: 24px; height: 24px; border-radius: 50%; background: var(--bg-secondary); border: 0.5px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; flex-shrink: 0; margin-top: 1px; }
.step-txt { font-size: 14px; line-height: 1.75; }
.cta-box { border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.75rem 1.5rem; text-align: center; margin-top: .5rem; }
.cta-eyebrow { font-size: 11px; font-weight: 500; letter-spacing: .1em; color: var(--text-secondary); margin-bottom: .875rem; }
.cta-title { font-family: 'Noto Serif TC', serif; font-size: 18px; font-weight: 700; line-height: 1.5; margin-bottom: .75rem; }
.cta-sub { font-size: 13px; color: var(--text-secondary); line-height: 1.75; margin-bottom: 1.25rem; }
.cta-btn { display: inline-block; font-family: 'Noto Sans TC', sans-serif; font-size: 14px; font-weight: 500; padding: 12px 32px; background: var(--accent); color: var(--accent-text); border-radius: var(--radius-md); border: none; cursor: pointer; text-decoration: none; transition: opacity .15s; }
.cta-btn:hover { opacity: .85; }
.restart { display: block; text-align: center; font-size: 13px; color: var(--text-secondary); margin-top: 1rem; cursor: pointer; text-decoration: underline; text-underline-offset: 3px; background: none; border: none; font-family: 'Noto Sans TC', sans-serif; width: 100%; }
.divider { border: none; border-top: 0.5px solid var(--border); margin: 1.5rem 0; }
@media (max-width: 480px) {

<script>
const WORDS = ['完全不像我','比較不像','有時候像','蠻像的','完全像我'];

const Qs = [
  // E/I 6題
  {dim:'E',dir:'I',ch:'第一章：能量來源',tag:'能量來源',t:'跟一群人相處一整天之後，我需要一個人待著充電。',s:'想想你實際上的感受，不是你覺得應該怎樣。'},
  {dim:'E',dir:'I',ch:'第一章：能量來源',tag:'能量來源',t:'比起很多人留言互動，我更享受一個人慢慢把一篇文章寫好。',s:'哪種狀態讓你更有成就感？'},
  {dim:'E',dir:'E',ch:'第一章：能量來源',tag:'能量來源',t:'我喜歡在網路上認識新朋友、和陌生人聊天。',s:'就算只是文字互動也算，選最像你平常的狀態。'},
  {dim:'E',dir:'E',ch:'第一章：能量來源',tag:'能量來源',t:'我在人多的場合會比較有活力，一個人反而容易感到無聊。',s:'這描述你嗎？'},
  {dim:'E',dir:'I',ch:'第一章：能量來源',tag:'能量來源',t:'我通常需要一段獨處時間，才能把想法整理清楚。',s:'獨處對你來說是充電還是消耗？'},
  {dim:'E',dir:'E',ch:'第一章：能量來源',tag:'能量來源',t:'我喜歡把我在做的事說給別人聽，分享本身就讓我有動力。',s:'分享這個動作，對你來說是享受還是義務？'},
  // N/S 6題
  {dim:'N',dir:'N',ch:'第二章：思考方式',tag:'思考方式',t:'看到一件新事物，我第一個想的是「這讓我聯想到什麼」。',s:'不是應該怎麼想，是你真實的第一個念頭。'},
  {dim:'N',dir:'S',ch:'第二章：思考方式',tag:'思考方式',t:'我比較喜歡有步驟、有清單的內容，而不是概念性的思考文章。',s:'在消費別人內容的時候，你偏好哪一種？'},
  {dim:'N',dir:'N',ch:'第二章：思考方式',tag:'思考方式',t:'我常常同時有很多想法，腦袋停不下來。',s:'這是描述你日常的狀態嗎？'},
  {dim:'N',dir:'S',ch:'第二章：思考方式',tag:'思考方式',t:'我做事情喜歡先看具體的例子，再理解背後的原理。',s:'學習新東西時，你的習慣是什麼？'},
  {dim:'N',dir:'N',ch:'第二章：思考方式',tag:'思考方式',t:'我對「可能性」和「未來會怎樣」比「現在怎麼做」更感興趣。',s:'你更常想的是哪個？'},
  {dim:'N',dir:'S',ch:'第二章：思考方式',tag:'思考方式',t:'我比較相信親身試過的經驗，而不是理論上說得通的方法。',s:'你做決定時更依賴哪個？'},
  // 性別與年齡（插入在第二章後）
  {dim:'GENDER',dir:'GENDER',ch:'關於你自己',tag:'關於你自己',t:'在我們繼續之前，選一個最接近你的選項：',s:'這可以幫助我們提供更精準的分析結果。'},
  {dim:'AGE',dir:'AGE',ch:'關於你自己',tag:'關於你自己',t:'你目前的年齡區間：',s:'選一個最接近你的選項。'},
  // F/T 6題
  {dim:'F',dir:'F',ch:'第三章：決策方式',tag:'決策方式',t:'我希望看完我內容的人，第一個感受是「你懂我」。',s:'比起「我學到東西了」，你更想要哪一種回應？'},
  {dim:'F',dir:'T',ch:'第三章：決策方式',tag:'決策方式',t:'做一個困難決定時，我會先列出優缺點，分析完再決定。',s:'你實際上是這樣做決定的嗎？'},
  {dim:'F',dir:'F',ch:'第三章：決策方式',tag:'決策方式',t:'有人跟我說他的困境，我會先陪他說說感受，而不是馬上給建議。',s:'你通常的第一反應是什麼？'},
  {dim:'F',dir:'T',ch:'第三章：決策方式',tag:'決策方式',t:'我在乎我的內容有沒有邏輯、有沒有根據，而不只是感覺好不好。',s:'你評估內容品質的標準是什麼？'},
  {dim:'F',dir:'F',ch:'第三章：決策方式',tag:'決策方式',t:'我做決定時，「感覺對不對」比「數據說什麼」更重要。',s:'誠實選，不用想應該怎麼答。'},
  {dim:'F',dir:'T',ch:'第三章：決策方式',tag:'決策方式',t:'我喜歡用數字、案例、比較來說服人，而不是靠情感共鳴。',s:'你說服別人時，通常用哪種方式？'},
  // J/P 6題
  {dim:'J',dir:'J',ch:'第四章：行動方式',tag:'行動方式',t:'我比較喜歡先把計畫想清楚，確定了再動手。',s:'描述你實際做事的方式，不是你理想的方式。'},
  {dim:'J',dir:'J',ch:'第四章：行動方式',tag:'行動方式',t:'沒做完的事情放著，會讓我一直不舒服。',s:'那種「還沒做完」的感覺，對你來說有多強烈？'},
  {dim:'J',dir:'P',ch:'第四章：行動方式',tag:'行動方式',t:'我做事比較隨興，根據當下狀態決定今天做什麼。',s:'這句話像不像你平常的行動模式？'},
  {dim:'J',dir:'P',ch:'第四章：行動方式',tag:'行動方式',t:'我喜歡保持彈性，不喜歡被固定的計畫或流程綁住。',s:'計畫對你來說是支撐還是束縛？'},
  {dim:'J',dir:'J',ch:'第四章：行動方式',tag:'行動方式',t:'我通常會提前規劃好，而不是等到最後一刻才決定。',s:'你面對截止日期時通常是什麼狀態？'},
  {dim:'J',dir:'P',ch:'第四章：行動方式',tag:'行動方式',t:'我比較喜歡邊做邊調整，而不是一開始就把所有細節想清楚。',s:'這更像你的工作方式嗎？'},
];

const CTYPES = [
  {key:'knowledge',title:'知識技能型',eg:'設計師、理財規劃師、健身教練、廚師、老師……我有一個專業或技能想分享'},
  {key:'life',title:'生活經歷型',eg:'媽媽、旅居者、斜槓工作者、從某個困境走出來的人……我想分享我的生活方式或人生故事'},
  {key:'creative',title:'創作作品型',eg:'插畫師、攝影師、手工藝者、室內設計師……我有作品要展示'},
  {key:'opinion',title:'觀點意見型',eg:'對產業有獨特見解的創業者、有主張的教育者……我對某些事有強烈看法想說出來'},
  {key:'business',title:'商品服務型',eg:'開店的人、接案者、有課程的老師、顧問……我有產品或服務，想用內容帶客戶'}
];

  },
  both:{
    title:'你有兩個隱藏的煞車——完美主義加上害怕被看見',
    txt:'你的個性特質非常清晰，但你同時有兩個強烈的阻力：覺得自己還不夠好，又害怕發出去被批評。這兩個加在一起，會讓你一直停在「準備」的狀態，永遠踏不出去。',
    steps:['今天只做一件事：寫三句話，不用發，先讓「動」這個動作存在。明天再寫三句，第三天才考慮發。','把你的第一篇設定為「只給一個人看」——不是發給所有人，只傳給一個你信任的朋友，先從這裡開始。','記住：你現在的「不夠好」，對還沒開始的人來說，已經是「遠遠超前」了。']

};

const DIMS_DISPLAY = [
  {key:'E', loLabel:'內向能量', hiLabel:'外向能量'},
  {key:'N', loLabel:'實感思考', hiLabel:'直覺思考'},
  {key:'F', loLabel:'邏輯決策', hiLabel:'情感決策'},
  {key:'J', loLabel:'彈性行動', hiLabel:'計畫行動'}
];

let cur = 0, ans = new Array(26).fill(null), currentMBTI = '', selectedGender = '', selectedAge = '';

function render() {
  const q = Qs[cur];
  document.getElementById('chap-name').textContent = q.ch;
  document.getElementById('q-counter').textContent = (cur+1) + ' / 26';
  document.getElementById('prog-fill').style.width = ((cur+1)/26*100) + '%';
  document.getElementById('q-tag').textContent = q.tag;
  document.getElementById('q-text').textContent = q.t;
  document.getElementById('q-hint').textContent = q.s;
  const row = document.getElementById('likert-row');
  const likertLabels = document.querySelector('.likert-labels');
  row.innerHTML = '';

  if (q.dim === 'GENDER') {
    likertLabels.style.display = 'none';
    row.style.gridTemplateColumns = 'repeat(3, 1fr)';
    const genderOpts = ['女性','男性','不想透露'];
    genderOpts.forEach((opt, i) => {
      const d = document.createElement('div');
      d.className = 'lk' + (ans[cur] === i+1 ? ' sel' : '');
      d.style.padding = '16px 8px';
      d.innerHTML = '<div class="lk-dot"></div><div class="lk-word" style="font-size:14px;min-height:auto;margin-top:6px">'+opt+'</div>';
      d.onclick = (v => () => { selectedGender = opt; pick(v); })(i+1);
      row.appendChild(d);
    });
  } else if (q.dim === 'AGE') {
    likertLabels.style.display = 'none';
    row.style.gridTemplateColumns = 'repeat(3, 1fr)';
    row.style.gap = '8px';
    const ageOpts = ['18歲以下','18–20歲','21–24歲','25–29歲','30–34歲','35–39歲','40–44歲','45–49歲','50–54歲','55–59歲','60–64歲','65歲以上'];
    ageOpts.forEach((opt, i) => {
      const d = document.createElement('div');
      d.className = 'lk' + (ans[cur] === i+1 ? ' sel' : '');
      d.style.padding = '12px 4px';
      d.innerHTML = '<div class="lk-dot"></div><div class="lk-word" style="font-size:13px;min-height:auto;margin-top:6px">'+opt+'</div>';
      d.onclick = (v => () => { selectedAge = opt; pick(v); })(i+1);
      row.appendChild(d);
    });
  } else {
    likertLabels.style.display = 'flex';
    row.style.gridTemplateColumns = 'repeat(5, 1fr)';
    for (let i = 1; i <= 5; i++) {
      const d = document.createElement('div');
      d.className = 'lk' + (ans[cur] === i ? ' sel' : '');
      d.innerHTML = '<div class="lk-dot"></div><div class="lk-num">'+i+'</div><div class="lk-word">'+WORDS[i-1]+'</div>';
      d.onclick = (v => () => pick(v))(i);
      row.appendChild(d);
    }
  }
  document.getElementById('btn-back').disabled = cur === 0;
  document.getElementById('btn-next').disabled = ans[cur] === null;
  document.getElementById('btn-next').textContent = cur === 25 ? '看我的結果 →' : '下一題 →';
}

function pick(v) { ans[cur] = v; render(); }

function go(d) {
  if (d === 1 && cur === 25) { showResult(); return; }
  cur = Math.max(0, Math.min(25, cur + d));
  render();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function getDims() {
  const dims = {E:{hi:0,lo:0,n:0}, N:{hi:0,lo:0,n:0}, F:{hi:0,lo:0,n:0}, J:{hi:0,lo:0,n:0}};
  Qs.forEach((q, i) => {
    if (ans[i] === null) return;
    if (q.dim === 'GENDER' || q.dim === 'AGE') return;
    const v = ans[i];
    if (q.dir === 'E' || q.dir === 'I' || q.dir === 'N' || q.dir === 'S' || q.dir === 'F' || q.dir === 'T' || q.dir === 'J' || q.dir === 'P') {
      const dimKey = q.dim;
      const hiDir = {E:'E', N:'N', F:'F', J:'J'}[dimKey];
      const loDir = {E:'I', N:'S', F:'T', J:'P'}[dimKey];
      if (q.dir === hiDir) { dims[dimKey].hi += v; dims[dimKey].n++; }
      else { dims[dimKey].lo += v; dims[dimKey].n++; }
    }
  });
  const result = {};
  Object.keys(dims).forEach(k => {
    const hi = dims[k].hi;
    const lo = dims[k].lo;
    const total = hi + lo;
    result[k] = total > 0 ? hi / total : 0.5;
  });
  return result;
}

function getBLK() {
  // Q15 (idx 14): notready, Q16 (idx 15) fear - but we only have 24 questions now
  // Using last 2 questions as BLK proxy - actually we don't have BLK questions in v7
  // Use J/P as proxy: very high J + very low N = more likely to feel stuck
  // Simple approach: check if user scored low on both E and N and F dimensions
  return {fear: false, notready: false};
}

function getMBTI(d) {
  const E = d.E >= 0.5 ? 'E' : 'I';
  const N = d.N >= 0.5 ? 'N' : 'S';
  const F = d.F >= 0.5 ? 'F' : 'T';
  const J = d.J >= 0.5 ? 'J' : 'P';
  return E + N + F + J;
}


function sendToSheets(archetype, dims, ctype) {
  const url = 'https://script.google.com/macros/s/AKfycbxSGTYmdxH6LSB08W7CJcaRsMhxJCezPAoi9Xuy6ovxuLs-vt6PmUvmjGLrgqsJt-QKAg/exec';
  fetch(url, {
    method: 'POST',
    mode: 'no-cors',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      archetype: archetype,
      E: Math.round(dims.E * 100),
      N: Math.round(dims.N * 100),
      F: Math.round(dims.F * 100),
      J: Math.round(dims.J * 100),
      ctype: ctype || '未選擇',
      gender: selectedGender || '未填寫',
      age: selectedAge || '未填寫'
    })
  }).catch(function(){});
}

function showResult() {
  const d = getDims();
  const mbti = getMBTI(d);
  currentMBTI = mbti;

  // Show loading state
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('result').style.display = 'block';
  document.getElementById('res-name').textContent = '分析中...';
  document.getElementById('res-tagline').textContent = '正在為你生成定位報告';
  window.scrollTo({top: 0, behavior: 'smooth'});

  // Fetch result from Workers API
  fetch('https://quiz-api.mybirthdayis1016.workers.dev', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      E: Math.round(d.E * 100),
      N: Math.round(d.N * 100),
      F: Math.round(d.F * 100),
      J: Math.round(d.J * 100)
    })
  })
  .then(r => r.json())
  .then(A => {
    sendToSheets(A.name, d, '未選擇');

    // Meta Pixel - 追蹤完成測驗事件
    if (typeof fbq !== 'undefined') {
      fbq('track', 'Lead', {content_name: A.name, content_category: A.mbti});
    }

    document.getElementById('res-name').textContent = A.name;
    document.getElementById('res-tagline').textContent = A.tag;
    document.getElementById('res-status').textContent = A.status;
    document.getElementById('res-insight').textContent = A.insight;
    document.getElementById('res-diff').textContent = A.diff;
    document.getElementById('diff-title').textContent = A.diff;
    document.getElementById('diff-txt').textContent = A.diffTxt;
    document.getElementById('sys-title').textContent = A.sys;
    document.getElementById('sys-txt').textContent = A.sysTxt;
    document.getElementById('cta-title').textContent = A.cta;
    document.getElementById('cta-sub').textContent = A.ctas;

    const tr = document.getElementById('trait-row');
    tr.innerHTML = '';
    (A.traits || []).forEach(t => {
      const s = document.createElement('span');
      s.className = 'trait'; s.textContent = t; tr.appendChild(s);
    });

    const dg = document.getElementById('dim-grid');
    dg.innerHTML = '';
    DIMS_DISPLAY.forEach(dd => {
      const raw = d[dd.key] || 0.5;
      const pct = Math.round(raw * 100);
      const label = raw >= 0.5 ? dd.hiLabel : dd.loLabel;
      const c = document.createElement('div');
      c.className = 'dim-card';
      c.innerHTML = '<div class="dim-top"><div class="dim-name">'+label+'</div><div class="dim-pct">'+pct+'%</div></div><div class="dim-bg"><div class="dim-fill" style="width:'+pct+'%"></div></div>';
      dg.appendChild(c);
    });

    const cg = document.getElementById('ctype-grid');
    cg.innerHTML = '';
    CTYPES.forEach(ct => {
      const b = document.createElement('button');
      b.className = 'ctype-btn';
      b.innerHTML = '<div class="ctype-dot"></div><div class="ctype-info"><div class="ctype-title">'+ct.title+'</div><div class="ctype-eg">'+ct.eg+'</div></div>';
      b.onclick = () => selectCtype(ct.key, b, A.name, d);
      cg.appendChild(b);
    });

    // BLK warning
    const blkWarn = document.getElementById('blk-warn');
    const highFear = d.BLK >= 0.7 && ans[15] >= 4;
    const highNotReady = d.BLK >= 0.7 && ans[14] >= 4;
    let warnKey = null;
    if (highFear && highNotReady) warnKey = 'both';
    else if (highFear) warnKey = 'high_fear';
    else if (highNotReady) warnKey = 'high_notready';
    if (warnKey) {
      const W = BLK_WARN[warnKey];
      document.getElementById('blk-warn-title').textContent = W.title;
      document.getElementById('blk-warn-txt').textContent = W.txt;
      const ws = document.getElementById('blk-warn-steps');
      ws.innerHTML = '';
      W.steps.forEach((s, i) => {
        const div = document.createElement('div');
        div.className = 'blk-warn-step';
        div.innerHTML = '<div class="blk-warn-num">'+(i+1)+'</div><div class="blk-warn-stxt">'+s+'</div>';
        ws.appendChild(div);
      });
      blkWarn.style.display = 'block';
    } else {
      blkWarn.style.display = 'none';
    }
  })
  .catch(err => {
    document.getElementById('res-name').textContent = '載入失敗，請重新整理頁面';
    document.getElementById('res-tagline').textContent = err.message;
  });
}

function selectCtype(ctypeKey, el, archetypeName, dims) {
  document.querySelectorAll('.ctype-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');

  if (archetypeName) {
    sendToSheets(archetypeName, dims || getDims(), ctypeKey);
  }

  // Fetch steps from Workers API
  fetch('https://quiz-api.mybirthdayis1016.workers.dev/steps', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      E: Math.round((dims || getDims()).E * 100),
      N: Math.round((dims || getDims()).N * 100),
      F: Math.round((dims || getDims()).F * 100),
      J: Math.round((dims || getDims()).J * 100),
      ctype: ctypeKey
    })
  })
  .then(r => r.json())
  .then(data => {
    const sw = document.getElementById('steps-wrap');
    sw.classList.add('show');
    const st = document.getElementById('steps');
    st.innerHTML = '';
    (data.steps || []).forEach((s, i) => {
      const div = document.createElement('div');
      div.className = 'step';
      div.innerHTML = '<div class="step-num">'+(i+1)+'</div><div class="step-txt">'+s+'</div>';
      st.appendChild(div);
    });
    setTimeout(() => sw.scrollIntoView({behavior:'smooth', block:'start'}), 100);
  })
  .catch(() => {
    const sw = document.getElementById('steps-wrap');
    sw.classList.add('show');
    document.getElementById('steps').innerHTML = '<div class="step"><div class="step-txt">載入失敗，請重新整理頁面</div></div>';
  });
}
function restart() {
  cur = 0; ans = new Array(26).fill(null); currentMBTI = ''; selectedGender = ''; selectedAge = '';
  document.getElementById('result').style.display = 'none';
  document.getElementById('steps-wrap').classList.remove('show');
  document.getElementById('quiz').style.display = 'block';
  render();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

render();
</script>
