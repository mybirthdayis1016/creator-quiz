<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>創作者定位測驗 | 10XUE 老陳老師</title>
<meta name="description" content="回答16個問題，找出你獨一無二的創作者定位與專屬簡單系統。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg-secondary: #f5f5f3;
    --text: #1a1a1a;
    --text-secondary: #6b6b6b;
    --text-tertiary: #9b9b9b;
    --border: rgba(0,0,0,0.12);
    --border-hover: rgba(0,0,0,0.28);
    --border-active: rgba(0,0,0,0.45);
    --accent: #1a1a1a;
    --accent-text: #ffffff;
    --radius-md: 8px;
    --radius-lg: 12px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a1a;
      --bg-secondary: #252525;
      --text: #f0f0f0;
      --text-secondary: #a0a0a0;
      --text-tertiary: #6b6b6b;
      --border: rgba(255,255,255,0.12);
      --border-hover: rgba(255,255,255,0.28);
      --border-active: rgba(255,255,255,0.5);
      --accent: #f0f0f0;
      --accent-text: #1a1a1a;
    }
  }

  html { font-size: 16px; -webkit-text-size-adjust: 100%; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  .page-wrap {
    max-width: 680px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem 5rem;
  }

  /* ── Header ── */
  .site-header {
    text-align: center;
    margin-bottom: 2.5rem;
  }
  .site-logo {
    font-size: 12px;
    letter-spacing: .18em;
    color: var(--text-secondary);
    font-weight: 500;
    margin-bottom: .5rem;
  }
  .site-divider {
    width: 32px;
    height: 1px;
    background: var(--border);
    margin: .75rem auto 0;
  }

  /* ── Progress ── */
  .prog-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }
  .prog-bg {
    background: var(--bg-secondary);
    border-radius: 100px;
    height: 3px;
    margin-bottom: 2rem;
    overflow: hidden;
  }
  .prog-fill {
    height: 100%;
    background: var(--text);
    border-radius: 100px;
    transition: width .4s ease;
  }

  /* ── Question ── */
  .q-tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .08em;
    color: var(--text-secondary);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-md);
    padding: 3px 10px;
    margin-bottom: 1rem;
  }
  .q-text {
    font-family: 'Noto Serif TC', serif;
    font-size: 20px;
    font-weight: 400;
    line-height: 1.7;
    margin-bottom: .4rem;
  }
  .q-hint {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.65;
    margin-bottom: 1.875rem;
  }

  /* ── Likert ── */
  .likert-labels {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-tertiary);
    margin-bottom: .625rem;
  }
  .likert-row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    margin-bottom: 2rem;
  }
  .lk {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 7px;
    padding: 14px 4px 11px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-md);
    cursor: pointer;
    transition: border-color .15s, background .15s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .lk:hover { border-color: var(--border-hover); background: var(--bg-secondary); }
  .lk.sel { border-color: var(--border-active); background: var(--bg-secondary); }
  .lk.sel .lk-dot { background: var(--accent); border-color: var(--accent); }
  .lk-dot {
    width: 16px; height: 16px;
    border-radius: 50%;
    border: 1.5px solid var(--border-hover);
    transition: all .15s;
  }
  .lk-num { font-size: 13px; font-weight: 500; color: var(--text-secondary); }
  .lk-word {
    font-size: 11px;
    color: var(--text-secondary);
    text-align: center;
    line-height: 1.35;
    min-height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── Nav buttons ── */
  .nav { display: flex; justify-content: space-between; align-items: center; }
  .btn {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    font-weight: 500;
    padding: 11px 24px;
    border-radius: var(--radius-md);
    cursor: pointer;
    border: 0.5px solid var(--border-hover);
    background: transparent;
    color: var(--text);
    transition: background .15s;
  }
  .btn:hover { background: var(--bg-secondary); }
  .btn.pri {
    background: var(--accent);
    color: var(--accent-text);
    border-color: var(--accent);
  }
  .btn.pri:hover { opacity: .85; }
  .btn:disabled { opacity: .3; cursor: default; pointer-events: none; }

  /* ── Result ── */
  .result { display: none; }

  .res-hero {
    text-align: center;
    padding: 2rem 0 2rem;
    border-bottom: 0.5px solid var(--border);
    margin-bottom: 2rem;
  }
  .res-eyebrow {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .12em;
    color: var(--text-secondary);
    margin-bottom: .875rem;
  }
  .trait-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 1.125rem;
  }
  .trait {
    font-size: 11px;
    font-weight: 500;
    padding: 3px 11px;
    border-radius: 100px;
    border: 0.5px solid var(--border);
    color: var(--text-secondary);
  }
  .res-name {
    font-family: 'Noto Serif TC', serif;
    font-size: 26px;
    font-weight: 700;
    line-height: 1.35;
    margin-bottom: .5rem;
  }
  .res-tagline {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.75;
  }

  /* ── Section ── */
  .sec { margin-bottom: 1.625rem; }
  .sec-lbl {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .08em;
    color: var(--text-secondary);
    margin-bottom: .5rem;
  }
  .sec-txt { font-size: 14px; line-height: 1.85; }

  /* ── Dim grid ── */
  .dim-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0,1fr));
    gap: 10px;
    margin-bottom: 1.625rem;
  }
  .dim-card {
    background: var(--bg-secondary);
    border-radius: var(--radius-md);
    padding: 12px 14px;
  }
  .dim-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 7px;
  }
  .dim-name { font-size: 12px; font-weight: 500; }
  .dim-pct { font-size: 11px; color: var(--text-secondary); }
  .dim-bg {
    background: var(--bg);
    border-radius: 100px;
    height: 4px;
    overflow: hidden;
    border: 0.5px solid var(--border);
  }
  .dim-fill { height: 100%; border-radius: 100px; background: var(--text); }

  /* ── Insight box ── */
  .insight {
    background: var(--bg-secondary);
    border-radius: var(--radius-md);
    padding: 16px 18px;
    margin-bottom: 1.625rem;
  }
  .insight-lbl {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .08em;
    color: var(--text-secondary);
    margin-bottom: .625rem;
  }
  .insight-txt { font-size: 14px; line-height: 1.875; }

  /* ── System box ── */
  .sys-box {
    border: 0.5px solid var(--border);
    border-radius: var(--radius-md);
    padding: 16px 18px;
    margin-bottom: 1.625rem;
  }
  .sys-lbl {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .08em;
    color: var(--text-secondary);
    margin-bottom: .5rem;
  }
  .sys-title { font-size: 15px; font-weight: 500; margin-bottom: .5rem; }
  .sys-txt { font-size: 13px; color: var(--text-secondary); line-height: 1.8; }

  /* ── Content type selector ── */
  .ctype-grid { display: flex; flex-direction: column; gap: 8px; margin-top: .75rem; }
  .ctype-btn {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 16px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-md);
    cursor: pointer;
    transition: border-color .15s, background .15s;
    text-align: left;
    background: transparent;
    font-family: 'Noto Sans TC', sans-serif;
    color: var(--text);
    width: 100%;
    -webkit-tap-highlight-color: transparent;
  }
  .ctype-btn:hover { border-color: var(--border-hover); background: var(--bg-secondary); }
  .ctype-btn.active { border-color: var(--border-active); background: var(--bg-secondary); }
  .ctype-btn.active .ctype-dot { background: var(--accent); border-color: var(--accent); }
  .ctype-dot {
    width: 15px; height: 15px;
    border-radius: 50%;
    border: 1.5px solid var(--border-hover);
    flex-shrink: 0;
    margin-top: 3px;
    transition: all .15s;
  }
  .ctype-info { flex: 1; }
  .ctype-title { font-size: 14px; font-weight: 500; margin-bottom: 3px; }
  .ctype-eg { font-size: 12px; color: var(--text-secondary); line-height: 1.55; }

  /* ── Steps ── */
  .steps-wrap { display: none; margin-bottom: 1.625rem; }
  .steps-wrap.show { display: block; }
  .steps { display: flex; flex-direction: column; gap: 14px; }
  .step { display: flex; gap: 13px; }
  .step-num {
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--bg-secondary);
    border: 0.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 500;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .step-txt { font-size: 14px; line-height: 1.75; }

  /* ── CTA ── */
  .cta-box {
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.75rem 1.5rem;
    text-align: center;
    margin-top: .5rem;
  }
  .cta-eyebrow {
    font-size: 11px; font-weight: 500;
    letter-spacing: .1em;
    color: var(--text-secondary);
    margin-bottom: .875rem;
  }
  .cta-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 18px; font-weight: 700;
    line-height: 1.5;
    margin-bottom: .75rem;
  }
  .cta-sub {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.75;
    margin-bottom: 1.25rem;
  }
  .cta-btn {
    display: inline-block;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px; font-weight: 500;
    padding: 12px 32px;
    background: var(--accent);
    color: var(--accent-text);
    border-radius: var(--radius-md);
    border: none;
    cursor: pointer;
    text-decoration: none;
    transition: opacity .15s;
  }
  .cta-btn:hover { opacity: .85; }

  .restart {
    display: block;
    text-align: center;
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 1rem;
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 3px;
    background: none;
    border: none;
    font-family: 'Noto Sans TC', sans-serif;
    width: 100%;
  }

  .divider { border: none; border-top: 0.5px solid var(--border); margin: 1.5rem 0; }
  /* ── BLK Warning Block ── */
  .blk-warn {
    border: 0.5px solid var(--border);
    border-radius: var(--radius-md);
    padding: 16px 18px;
    margin-bottom: 1.625rem;
    position: relative;
  }
  .blk-warn-tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .08em;
    color: var(--text-secondary);
    margin-bottom: .625rem;
  }
  .blk-warn-title {
    font-size: 15px;
    font-weight: 500;
    margin-bottom: .5rem;
    line-height: 1.5;
  }
  .blk-warn-txt {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.8;
    margin-bottom: .875rem;
  }
  .blk-warn-steps {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .blk-warn-step {
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .blk-warn-num {
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--bg-secondary);
    border: 0.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 500;
    flex-shrink: 0; margin-top: 1px;
  }
  .blk-warn-stxt { font-size: 13px; line-height: 1.7; color: var(--text-secondary); }

  /* ── Mobile ── */
  @media (max-width: 480px) {
    .page-wrap { padding: 1.5rem 1rem 4rem; }
    .q-text { font-size: 17px; }
    .lk-word { font-size: 10px; }
    .dim-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="page-wrap">

  <header class="site-header">
    <div class="site-logo">10XUE · 老陳老師</div>
    <div class="site-divider"></div>
  </header>

  <!-- Quiz -->
  <div id="quiz">
    <div class="prog-row">
      <span id="chap-name"></span>

    </div>
    <div class="prog-bg"><div class="prog-fill" id="prog-fill"></div></div>
    <div class="q-tag" id="q-tag"></div>
    <div class="q-text" id="q-text"></div>
    <div class="q-hint" id="q-hint"></div>
    <div class="likert-labels">
      <span>← 完全不像我</span>

    </div>

    <div class="nav">
      <button class="btn" id="btn-back" onclick="go(-1)">← 上一題</button>
      <button class="btn pri" id="btn-next" onclick="go(1)" disabled>下一題 →</button>

  </div>

  <!-- Result -->
  <div class="result" id="result">
    <div class="res-hero">
      <div class="res-eyebrow">你的創作者原型</div>
      <div class="trait-row" id="trait-row"></div>

    <div class="sec">
      <div class="sec-lbl">你現在的狀態</div>
      <div class="sec-txt" id="res-status"></div>
    </div>

    <hr class="divider">
    <div class="sec-lbl" style="margin-bottom:10px">你的六個維度</div>
    <div class="dim-grid" id="dim-grid"></div>

    <div class="insight">
      <div class="insight-lbl">老陳老師說</div>
      <div class="insight-txt" id="res-insight"></div>
    </div>

    <hr class="divider">
    <div class="sec">
      <div class="sec-lbl">你的核心優勢</div>
      <div class="sec-txt" id="res-diff"></div>

    <hr class="divider">
    <div class="sys-box">
      <div class="sys-lbl">你的專屬簡單系統</div>

      <div class="sys-txt" id="sys-txt"></div>
    </div>


    <div class="blk-warn" id="blk-warn" style="display:none">
      <div class="blk-warn-tag">老陳老師特別提醒你</div>
      <div class="blk-warn-title" id="blk-warn-title"></div>

    <div class="steps-wrap" id="steps-wrap">

      <div class="steps" id="steps"></div>
    </div>

    <hr class="divider">
    <div class="cta-box">
      <div class="cta-eyebrow">老陳老師的訂閱服務</div>

    <button class="restart" onclick="restart()">重新測驗</button>
  </div>

</div>

<script>
const WORDS = ['完全不像我','比較不像','有時候像','蠻像的','完全像我'];

const Qs = [
  {dim:'E',rev:true, ch:'第一章：能量來源',tag:'能量來源',t:'跟一群人相處一整天之後，我需要一個人待著充電。',s:'想想你實際上的感受，不是你覺得應該怎樣。'},
  {dim:'E',rev:true, ch:'第一章：能量來源',tag:'能量來源',t:'比起很多人留言互動，我更享受一個人慢慢把一篇文章寫好。',s:'哪種狀態讓你更有成就感？'},
  {dim:'E',rev:false,ch:'第一章：能量來源',tag:'能量來源',t:'我喜歡在網路上認識新朋友、和陌生人聊天。',s:'就算只是文字互動也算，選最像你平常的狀態。'},
  {dim:'N',rev:false,ch:'第二章：思考方式',tag:'思考方式',t:'看到一件新事物，我第一個想的是「這讓我聯想到什麼」。',s:'不是應該怎麼想，是你真實的第一個念頭。'},
  {dim:'N',rev:true, ch:'第二章：思考方式',tag:'思考方式',t:'我比較喜歡有步驟、有清單的內容，而不是概念性的思考文章。',s:'在消費別人內容的時候，你偏好哪一種？'},
  {dim:'N',rev:false,ch:'第二章：思考方式',tag:'思考方式',t:'我常常同時有很多想法，腦袋停不下來。',s:'這是描述你日常的狀態嗎？'},
  {dim:'F',rev:false,ch:'第三章：決策方式',tag:'決策方式',t:'我希望看完我內容的人，第一個感受是「你懂我」。',s:'比起「我學到東西了」，你更想要哪一種回應？'},
  {dim:'F',rev:true, ch:'第三章：決策方式',tag:'決策方式',t:'做一個困難決定時，我會先列出優缺點，分析完再決定。',s:'你實際上是這樣做決定的嗎？'},
  {dim:'F',rev:false,ch:'第三章：決策方式',tag:'決策方式',t:'有人跟我說他的困境，我會先陪他說說感受，而不是馬上給建議。',s:'你通常的第一反應是什麼？'},
  {dim:'J',rev:false,ch:'第四章：行動方式',tag:'行動方式',t:'我比較喜歡先把計畫想清楚，確定了再動手。',s:'描述你實際做事的方式，不是你理想的方式。'},
  {dim:'J',rev:false,ch:'第四章：行動方式',tag:'行動方式',t:'沒做完的事情放著，會讓我一直不舒服。',s:'那種「還沒做完」的感覺，對你來說有多強烈？'},
  {dim:'J',rev:true, ch:'第四章：行動方式',tag:'行動方式',t:'我做事比較隨興，根據當下狀態決定今天做什麼。',s:'這句話像不像你平常的行動模式？'},
  {dim:'ID',rev:false,ch:'第五章：身份輪廓',tag:'身份輪廓',t:'我很難用一個詞描述自己，因為我同時在做好幾件不同的事。',s:'別人問你「你是做什麼的」，你回答起來容易嗎？'},
  {dim:'ID',rev:false,ch:'第五章：身份輪廓',tag:'身份輪廓',t:'我有走過一段特別的路，那段經歷讓我變成現在這個人。',s:'不一定是成功故事，困難或轉折也算。'},
  {dim:'BLK',rev:false,ch:'第六章：起跑狀態',tag:'起跑狀態',t:'我覺得自己還沒準備好，想再多學一點再開始。',s:'誠實選就好，這很常見，不是弱點。'},

  {key:'E', lo:'內向能量', hi:'外向能量'},
  {key:'N', lo:'實感思考', hi:'直覺思考'},
  {key:'F', lo:'邏輯決策', hi:'情感決策'},
  {key:'J', lo:'彈性行動', hi:'計畫行動'},

let cur = 0, ans = new Array(16).fill(null), currentKey = '';

function render() {
  const q = Qs[cur];
  document.getElementById('chap-name').textContent = q.ch;
  document.getElementById('q-counter').textContent = (cur+1) + ' / 16';
  document.getElementById('prog-fill').style.width = ((cur+1)/16*100) + '%';
  document.getElementById('q-tag').textContent = q.tag;
  document.getElementById('q-text').textContent = q.t;
  document.getElementById('q-hint').textContent = q.s;
  const row = document.getElementById('likert-row');
  row.innerHTML = '';
  for (let i = 1; i <= 5; i++) {
    const d = document.createElement('div');
    d.className = 'lk' + (ans[cur] === i ? ' sel' : '');
    d.innerHTML = '<div class="lk-dot"></div><div class="lk-num">'+i+'</div><div class="lk-word">'+WORDS[i-1]+'</div>';
    d.onclick = (v => () => pick(v))(i);
    row.appendChild(d);
  }
  document.getElementById('btn-back').disabled = cur === 0;
  document.getElementById('btn-next').disabled = ans[cur] === null;
  document.getElementById('btn-next').textContent = cur === 15 ? '看我的結果 →' : '下一題 →';
}

function pick(v) { ans[cur] = v; render(); }

function go(d) {
  if (d === 1 && cur === 15) { showResult(); return; }
  cur = Math.max(0, Math.min(15, cur + d));
  render();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function getDims() {
  const s={E:0,N:0,F:0,J:0,ID:0,BLK:0}, c={E:0,N:0,F:0,J:0,ID:0,BLK:0};
  Qs.forEach((q,i) => {
    if (ans[i] === null) return;
    const v = q.rev ? (6 - ans[i]) : ans[i];
    s[q.dim] += v; c[q.dim]++;
  });
  const r = {};
  Object.keys(s).forEach(k => r[k] = c[k] ? s[k]/c[k] : 3);
  return r;
}

function getType(d) {
  if (d.ID  >= 3.5) return 'compound';
  const E=d.E>=3.5, N=d.N>=3.5, F=d.F>=3.5, J=d.J>=3.5;
  if (E && N)       return 'visionary';
  if (E && F && !N) return 'social';
  if (E && !F && !N)return 'demonstrator';
  if (!E && N)      return 'insight';
  if (!E && F && !N)return 'empath';
  if (!E && !F && J)return 'systematic';
  return 'explorer';
}

  },
  both: {
    title: '你有兩個隱藏的煞車——完美主義加上害怕被看見',
    txt: '你的個性特質非常清晰，但你同時有兩個強烈的阻力：覺得自己還不夠好，又害怕發出去被批評。這兩個加在一起，會讓你一直停在「準備」的狀態，永遠踏不出去。老陳老師看過最多的創作者困境，就是這個組合。',
    steps: [
      '今天只做一件事：寫三句話，不用發，先讓「動」這個動作存在。明天再寫三句，第三天才考慮發。',
      '把你的第一篇設定為「只給一個人看」——不是發給所有人，只傳給一個你信任的朋友，先從這裡開始。',
      '記住：你現在的「不夠好」，對還沒開始的人來說，已經是「遠遠超前」了。'
    ]
  }
};

function showResult() {
  const d = getDims();
  const key = getType(d);
  currentKey = key;
  const A = TYPES[key];
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('result').style.display = 'block';
  document.getElementById('res-name').textContent = A.name;
  document.getElementById('res-tagline').textContent = A.tag;
  document.getElementById('res-status').textContent = A.status;
  document.getElementById('res-insight').textContent = A.insight;
  document.getElementById('res-diff').textContent = A.diff;
  document.getElementById('sys-title').textContent = A.sys;
  document.getElementById('sys-txt').textContent = A.systxt;
  document.getElementById('cta-title').textContent = A.cta;
  document.getElementById('cta-sub').textContent = A.ctas;

  const tr = document.getElementById('trait-row');
  tr.innerHTML = '';
  A.traits.forEach(t => {
    const s = document.createElement('span');
    s.className = 'trait'; s.textContent = t; tr.appendChild(s);
  });

  const dg = document.getElementById('dim-grid');
  dg.innerHTML = '';
  DIMS.forEach(dd => {
    const raw = d[dd.key] || 3;
    const pct = Math.round((raw-1)/4*100);
    const label = raw >= 3 ? dd.hi : dd.lo;
    const c = document.createElement('div');
    c.className = 'dim-card';
    c.innerHTML = '<div class="dim-top"><div class="dim-name">'+label+'</div><div class="dim-pct">'+pct+'%</div></div><div class="dim-bg"><div class="dim-fill" style="width:'+pct+'%"></div></div>';
    dg.appendChild(c);
  });


  // BLK warning block
  const blkWarn = document.getElementById('blk-warn');
  const highFear = d.BLK >= 3.5 && ans[15] >= 4;
  const highNotReady = d.BLK >= 3.5 && ans[14] >= 4;
  let warnKey = null;
  if (highFear && highNotReady) warnKey = 'both';
  else if (highFear) warnKey = 'high_fear';
  else if (highNotReady) warnKey = 'high_notready';

  if (warnKey) {
    const W = BLK_WARN[warnKey];
    document.getElementById('blk-warn-title').textContent = W.title;
    document.getElementById('blk-warn-txt').textContent = W.txt;
    const ws = document.getElementById('blk-warn-steps');
    ws.innerHTML = '';
    W.steps.forEach((s, i) => {
      const div = document.createElement('div');
      div.className = 'blk-warn-step';
      div.innerHTML = '<div class="blk-warn-num">'+(i+1)+'</div><div class="blk-warn-stxt">'+s+'</div>';
      ws.appendChild(div);
    });
    blkWarn.style.display = 'block';
  } else {
    blkWarn.style.display = 'none';
  }

  const cg = document.getElementById('ctype-grid');
  cg.innerHTML = '';
  CTYPES.forEach(ct => {
    const b = document.createElement('button');
    b.className = 'ctype-btn';
    b.innerHTML = '<div class="ctype-dot"></div><div class="ctype-info"><div class="ctype-title">'+ct.title+'</div><div class="ctype-eg">'+ct.eg+'</div></div>';
    b.onclick = () => selectCtype(ct.key, ct.title, b);
    cg.appendChild(b);
  });

  window.scrollTo({top: 0, behavior: 'smooth'});
}

function selectCtype(key, title, el) {
  document.querySelectorAll('.ctype-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  const stepsData = STEPS[key][currentKey];
  const sw = document.getElementById('steps-wrap');
  sw.classList.add('show');
  const st = document.getElementById('steps');
  st.innerHTML = '';
  stepsData.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'step';
    div.innerHTML = '<div class="step-num">'+(i+1)+'</div><div class="step-txt">'+s+'</div>';
    st.appendChild(div);
  });
  setTimeout(() => sw.scrollIntoView({behavior:'smooth', block:'start'}), 100);
}

function restart() {
  cur = 0; ans = new Array(16).fill(null); currentKey = '';
  document.getElementById('result').style.display = 'none';
  document.getElementById('steps-wrap').classList.remove('show');
  document.getElementById('quiz').style.display = 'block';
  render();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

render();
</script>
</body>
</html>
